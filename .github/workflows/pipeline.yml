name: Security Pipeline

on:
  push:
    branches:
      - main

jobs:
  sast-sonarqube:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run SonarQube Scan
        shell: powershell
        run: |
          & "C:\sonar-scanner\sonar-scanner-cli-8.0.1.6346-windows-x64\bin\sonar-scanner.bat" `
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }} `
            -Dsonar.sources=apps/juice-shop `
            -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} `
            -Dsonar.token=${{ secrets.SONAR_TOKEN }}

  dast-security-test:
    runs-on: ubuntu-latest
    needs: sast-sonarqube

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create reports directory
        run: mkdir -p reports

      - name: Run Juice Shop container
        run: |
          docker run -d -p 3000:3000 --name juice-shop bkimminich/juice-shop
          sleep 30

      - name: Check if app is running
        run: |
          curl -I http://localhost:3000

      - name: Run OWASP ZAP Scan
        run: |
          docker run --rm \
            --network=host \
            -v "${{ github.workspace }}/reports:/zap/wrk/:rw" \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py -t http://localhost:3000 -r zap-report.html || true

      - name: Install Nuclei
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip
          wget https://github.com/projectdiscovery/nuclei/releases/download/v3.3.7/nuclei_3.3.7_linux_amd64.zip
          unzip -o nuclei_3.3.7_linux_amd64.zip
          sudo mv nuclei /usr/local/bin/

      - name: Run Nuclei
        run: |
          nuclei -u http://localhost:3000 -o reports/nuclei-report.txt || true

      - name: Upload Reports
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: reports/
          if-no-files-found: warn