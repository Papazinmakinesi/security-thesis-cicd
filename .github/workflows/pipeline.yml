name: Security Pipeline

on:
  push:
    branches:
      - main

jobs:
  security-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Juice Shop container
        run: |
          docker run -d -p 3000:3000 --name juice-shop bkimminich/juice-shop
          sleep 25

      - name: Check if app is running
        run: |
          curl -I http://localhost:3000

      - name: Run OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://localhost:3000'
          allow_issue_writing: false
          artifact_name: zap-scan

      - name: Install Nuclei
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip
          mkdir -p /tmp/nuclei-install
          cd /tmp/nuclei-install
          wget https://github.com/projectdiscovery/nuclei/releases/download/v3.3.7/nuclei_3.3.7_linux_amd64.zip
          unzip -o nuclei_3.3.7_linux_amd64.zip
          sudo mv nuclei /usr/local/bin/
          nuclei -version

      - name: Update Nuclei Templates
        run: |
          nuclei -update-templates

      - name: Run Nuclei Scan
        run: |
          mkdir -p reports
          nuclei -u http://localhost:3000 -o reports/nuclei-report.txt || true

      - name: Upload Nuclei Report
        uses: actions/upload-artifact@v4
        with:
          name: nuclei-report
          path: reports/nuclei-report.txt
          if-no-files-found: warn